<!DOCTYPE html>
<html>
<head>
    <title>EASY TOOL - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #10b981;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error {
            color: #ef4444;
            margin-top: 10px;
        }
        .success {
            color: #10b981;
            margin-top: 10px;
        }
        h2 {
            color: #10b981;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 EASY TOOL LOGIN</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="message"></div>
        <p style="margin-top: 15px; font-size: 12px;">Demo: REYTECHFX / valentina241</p>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            if (!username || !password) {
                messageDiv.innerHTML = '<span class="error">Please enter username and password</span>';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<span class="success">✅ ' + data.message + '</span>';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 2000);
                } else {
                    messageDiv.innerHTML = '<span class="error">❌ ' + data.error + '</span>';
                }
            } catch (error) {
                messageDiv.innerHTML = '<span class="error">❌ Login failed. Try again.</span>';
            }
        }
    </script>
</body>
</html>
